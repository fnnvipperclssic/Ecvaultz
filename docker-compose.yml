services:
  # PHP + Nginx Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecvaultz-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_NAME: "${APP_NAME:-Ecvaultz}"
      APP_ENV: "${APP_ENV:-production}"
      APP_DEBUG: "${APP_DEBUG:-false}"
      APP_KEY: "${APP_KEY}"
      APP_URL: "${APP_URL:-http://localhost:8080}"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-ecvaultz}"
      DB_USERNAME: "${DB_USERNAME:-ecvaultz_user}"
      DB_PASSWORD: "${DB_PASSWORD}"
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SESSION_DRIVER: database
      CACHE_DRIVER: redis
      FILESYSTEM_DISK: private
      SCAN_UPLOADS: "${SCAN_UPLOADS:-false}"
      MAIL_MAILER: "${MAIL_MAILER:-smtp}"
      MAIL_HOST: "${MAIL_HOST:-mailpit}"
      MAIL_PORT: "${MAIL_PORT:-1025}"
      TRUSTED_PROXIES: "*"
    volumes:
      - app-storage:/var/www/storage/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ecvaultz-net

  # MariaDB Database
  db:
    image: mariadb:10.11
    container_name: ecvaultz-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root_password}"
      MYSQL_DATABASE: "${DB_DATABASE:-ecvaultz}"
      MYSQL_USER: "${DB_USERNAME:-ecvaultz_user}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-ecvaultz_pass}"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecvaultz-net

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ecvaultz-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-null}"
    volumes:
      - redis-data:/data
    networks:
      - ecvaultz-net

  # Mailpit (Email testing - dev only)
  mailpit:
    image: axllent/mailpit:latest
    container_name: ecvaultz-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP
    networks:
      - ecvaultz-net
    profiles:
      - dev

networks:
  ecvaultz-net:
    driver: bridge

volumes:
  app-storage:
  db-data:
  redis-data:
