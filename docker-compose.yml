services:
  # Laravel App (PHP dev server)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecvaultz-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
      - /var/www/vendor
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=mariadb
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=ecvaultz
      - DB_USERNAME=root
      - DB_PASSWORD=rootpassword
      - CACHE_DRIVER=file
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=sync
      - SESSION_SECURE_COOKIE=false
      - SESSION_SAME_SITE=lax
      - SCAN_UPLOADS=false
      - HSTS_MAX_AGE=0
      - SESSION_IDLE_TIMEOUT=7200
    depends_on:
      mariadb:
        condition: service_healthy
      vite:
        condition: service_completed_successfully
    networks:
      - ecvaultz-network

  # Node.js - Build frontend assets (production mode for Docker dev)
  vite:
    image: node:24-alpine
    container_name: ecvaultz-vite
    working_dir: /var/www
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www
    command: sh -c "npm install && npm run build && echo 'BUILD_COMPLETE' > /var/www/public/build/.build-complete"
    networks:
      - ecvaultz-network

  # MariaDB Database
  mariadb:
    image: mariadb:11
    container_name: ecvaultz-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: ecvaultz
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - ecvaultz-network
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mariadb_data:

networks:
  ecvaultz-network:
    driver: bridge
