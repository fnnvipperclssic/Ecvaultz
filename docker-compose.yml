# Ecvaultz — Docker Compose (Windows / Linux / Mac)
# Start: docker compose up -d
# Stop:  docker compose down

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecvaultz-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      APP_NAME: Ecvaultz
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8080
      ASSET_URL: ""
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: mariadb
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ecvaultz
      DB_USERNAME: ecvaultz
      DB_PASSWORD: ecvaultz_secret
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      SESSION_DRIVER: database
      CACHE_DRIVER: redis
      QUEUE_CONNECTION: database
      FILESYSTEM_DISK: private
      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: 1025
      SCAN_UPLOADS: "false"
      TRUSTED_PROXIES: "*"
      HSTS_MAX_AGE: "0"
      TWO_FACTOR_REQUIRED: "false"
    volumes:
      - app-storage:/var/www/storage/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ecvaultz-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: mariadb:10.11
    container_name: ecvaultz-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root_secret_change_me
      MARIADB_DATABASE: ecvaultz
      MARIADB_USER: ecvaultz
      MARIADB_PASSWORD: ecvaultz_secret
    volumes:
      - db-data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecvaultz-net

  redis:
    image: redis:7-alpine
    container_name: ecvaultz-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - ecvaultz-net

  mailpit:
    image: axllent/mailpit:latest
    container_name: ecvaultz-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - ecvaultz-net

networks:
  ecvaultz-net:
    driver: bridge

volumes:
  app-storage:
  db-data:
  redis-data:
